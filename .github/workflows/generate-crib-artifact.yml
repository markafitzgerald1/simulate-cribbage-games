name: Generate Crib Artifact

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'

# Serialize rolling release updates on main to prevent overwrite races
concurrency:
  group: expected-crib-points-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  generate-table:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Runs Python in unbuffered mode (-u) so progress prints in real-time.
      # Limits max-generations to 1 for PRs; Generation 1 is ~700x slower due to
      # dynamic card combinations evaluation (690 hand score lookups per sample).
      - name: Generate analytical bootstrap table (Fast for PRs)
        if: github.event_name == 'pull_request'
        run: |
          python -u artifact_pipeline/analytical_solver.py --max-iterations=2 --full-hand-policy-max-iterations=1 --output expected_crib_points.analytical.json

      - name: Generate analytical bootstrap table (Production)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python -u artifact_pipeline/analytical_solver.py --output expected_crib_points.analytical.json

      - name: Run fast PR table generation
        if: github.event_name == 'pull_request'
        run: |
          python -u artifact_pipeline/generate_table.py --bootstrap=expected_crib_points.analytical.json --samples=300 --max-generations=1 --output=expected_crib_points.json --no-resume --seed=42

      # Bounded with --max-generations=3 to prevent runner timeouts when convergence is slow
      - name: Run production table generation
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python -u artifact_pipeline/generate_table.py --bootstrap=expected_crib_points.analytical.json --samples=8000 --convergence-threshold=0.01 --max-generations=3 --output=expected_crib_points.json --no-resume --seed=42

      - name: Upload analytical bootstrap artifact
        uses: actions/upload-artifact@v7
        with:
          name: expected-crib-points-analytical
          path: expected_crib_points.analytical.json

      - name: Upload table artifact
        uses: actions/upload-artifact@v7
        with:
          name: expected-crib-points
          path: expected_crib_points.json

  release-artifact:
    needs: generate-table
    # Limit releases exclusively to the main branch
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download table artifact
        uses: actions/download-artifact@v8
        with:
          name: expected-crib-points

      - name: Publish/Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: expected-crib-points
          name: "Latest Expected Crib Points Table"
          body: |
            This release contains the latest fully converged expected crib points table generated by the automated weekly CI/CD pipeline.

            Triggered by: ${{ github.event_name }} on commit ${{ github.sha }}.
          files: expected_crib_points.json
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
