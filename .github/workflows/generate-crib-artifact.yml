name: Generate Crib Artifact

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  generate-table:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run fast PR table generation
        if: github.event_name == 'pull_request'
        run: |
          python artifact_pipeline/generate_table.py --samples=1500 --max-generations=2 --output=expected_crib_points.json --no-resume --seed=42

      - name: Run production table generation
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          python artifact_pipeline/generate_table.py --samples=15000 --convergence-threshold=0.005 --output=expected_crib_points.json --no-resume --seed=42

      - name: Upload table artifact
        uses: actions/upload-artifact@v7
        with:
          name: expected-crib-points
          path: expected_crib_points.json

  release-artifact:
    needs: generate-table
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download table artifact
        uses: actions/download-artifact@v8
        with:
          name: expected-crib-points

      - name: Publish/Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: expected-crib-points
          name: "Latest Expected Crib Points Table"
          body: |
            This release contains the latest fully converged expected crib points table generated by the automated weekly CI/CD pipeline.

            Triggered by: ${{ github.event_name }} on commit ${{ github.sha }}.
          files: expected_crib_points.json
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
