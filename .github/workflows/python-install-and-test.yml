name: Python package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  legacy-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test with unittest and ensure >= 12% coverage
        run: |
          coverage run && coverage report

  artifact-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test artifact pipeline and ensure 100% coverage
        run: |
          coverage run -m unittest discover artifact_pipeline
          coverage report --fail-under=100 -m --include="artifact_pipeline/*"

  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Check for PEP8 style violations in artifact pipeline
        run: |
          flake8 artifact_pipeline
      - name: Check artifact pipeline pylint issues
        run: |
          pylint --persistent=n artifact_pipeline
      - name: Install PMD for CPD
        run: |
          PMD_VERSION=7.14.0
          curl -sSfL \
            "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip" \
            -o pmd.zip
          unzip -q pmd.zip
          echo "$PWD/pmd-bin-${PMD_VERSION}/bin" >> "$GITHUB_PATH"
      - name: Check for type errors
        run: |
          mypy simulate_cribbage_games.py artifact_pipeline
      - name: Check duplicate Python code
        run: |
          pmd cpd --language python --minimum-tokens 59 --dir simulate_cribbage_games.py,test_simulate_cribbage_games.py,setup.py,artifact_pipeline
      - name: Check for PEP8 style violations
        run: |
          flake8

  build:
    runs-on: ubuntu-latest
    needs:
      - legacy-tests
      - artifact-tests
      - lint-and-typecheck
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - name: Confirm split validation passed
        run: |
          echo "All Python validation jobs passed."
