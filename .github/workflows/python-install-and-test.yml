name: Python package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  legacy-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test with unittest and ensure >= 12% coverage
        run: |
          coverage run && coverage report

  artifact-fast-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test artifact pipeline fast path
        run: |
          coverage run --data-file=.coverage.fast -m unittest discover artifact_pipeline
      - name: Upload fast artifact coverage
        uses: actions/upload-artifact@v4
        with:
          name: artifact-coverage-fast-${{ matrix.python-version }}
          path: .coverage.fast
          include-hidden-files: true

  artifact-slow-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9.20"]
        group:
          - hessel-compat
          - zero-weights-coverage
          - support-main
          - support-dynamic-hessel
          - historical-true-nobs
          - historical-flat-nobs

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test exact analytical integration shard
        run: |
          coverage run --data-file=.coverage.slow-${{ matrix.group }} scripts/run_slow_analytical_tests.py ${{ matrix.group }}
      - name: Upload slow artifact coverage
        uses: actions/upload-artifact@v4
        with:
          name: artifact-coverage-slow-${{ matrix.group }}-${{ matrix.python-version }}
          path: .coverage.slow-${{ matrix.group }}
          include-hidden-files: true

  artifact-coverage:
    runs-on: ubuntu-latest
    needs:
      - artifact-fast-tests
      - artifact-slow-tests
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Download artifact coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-coverage-*-${{ matrix.python-version }}
          merge-multiple: true
      - name: Check artifact pipeline coverage
        run: |
          coverage combine .coverage.fast .coverage.slow-hessel-compat .coverage.slow-zero-weights-coverage .coverage.slow-support-main .coverage.slow-support-dynamic-hessel .coverage.slow-historical-true-nobs .coverage.slow-historical-flat-nobs
          coverage report --fail-under=100 -m --include="artifact_pipeline/*"

  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Check for PEP8 style violations in artifact pipeline
        run: |
          flake8 artifact_pipeline
      - name: Check artifact pipeline pylint issues
        run: |
          pylint --persistent=n artifact_pipeline
      - name: Check for type errors
        run: |
          mypy simulate_cribbage_games.py
      - name: Check for PEP8 style violations
        run: |
          flake8

  build:
    runs-on: ubuntu-latest
    needs:
      - legacy-tests
      - artifact-coverage
      - lint-and-typecheck
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - name: Confirm split validation passed
        run: |
          echo "All Python validation jobs passed."
