name: Python package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  legacy-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14.4"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test with unittest and ensure >= 12% coverage
        run: |
          coverage run && coverage report

  artifact-fast-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14.4"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test artifact pipeline fast path
        run: |
          coverage run --data-file=.coverage.fast -m unittest discover artifact_pipeline
      - name: Upload fast artifact coverage
        uses: actions/upload-artifact@v7
        with:
          name: artifact-coverage-fast-${{ matrix.python-version }}
          path: .coverage.fast
          include-hidden-files: true

  artifact-slow-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14.4"]
        group:
          - hessel-compat
          - zero-weights-coverage
          - support-dynamic-hessel
          - historical-true-nobs
          - historical-flat-nobs

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test exact analytical integration shard
        run: |
          coverage run --data-file=.coverage.slow-${{ matrix.group }} scripts/run_slow_analytical_tests.py ${{ matrix.group }}
      - name: Upload slow artifact coverage
        uses: actions/upload-artifact@v7
        with:
          name: artifact-coverage-slow-${{ matrix.group }}-${{ matrix.python-version }}
          path: .coverage.slow-${{ matrix.group }}
          include-hidden-files: true

  artifact-coverage:
    runs-on: ubuntu-latest
    needs:
      - artifact-fast-tests
      - artifact-slow-tests
    strategy:
      matrix:
        python-version: ["3.14.4"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Download artifact coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: artifact-coverage-*-${{ matrix.python-version }}
          merge-multiple: true
      - name: Check artifact pipeline coverage
        run: |
          coverage combine .coverage.fast .coverage.slow-hessel-compat .coverage.slow-zero-weights-coverage .coverage.slow-support-dynamic-hessel .coverage.slow-historical-true-nobs .coverage.slow-historical-flat-nobs
          coverage report --fail-under=100 -m --include="artifact_pipeline/*"

  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14.4"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Install Node.js dependencies
        run: |
          npm ci --ignore-scripts
      - name: Check for PEP8 style violations in artifact pipeline
        run: |
          flake8 artifact_pipeline
      - name: Check artifact pipeline pylint issues
        run: |
          pylint --persistent=n artifact_pipeline
      - name: Check for type errors
        run: |
          mypy simulate_cribbage_games.py
      - name: Check spelling
        run: |
          npm run spellcheck
      - name: Check for PEP8 style violations
        run: |
          flake8

  frontend-tests-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up Java JDK (required by PMD CPD)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install PMD CPD (v6.55.0)
        run: |
          wget -q https://github.com/pmd/pmd/releases/download/pmd_releases%2F6.55.0/pmd-bin-6.55.0.zip
          unzip -q pmd-bin-6.55.0.zip
          ln -s $GITHUB_WORKSPACE/pmd-bin-6.55.0/bin/run.sh $GITHUB_WORKSPACE/pmd-bin-6.55.0/bin/pmd
          echo "$GITHUB_WORKSPACE/pmd-bin-6.55.0/bin" >> $GITHUB_PATH
      - name: Install Node.js dependencies
        run: |
          npm ci
      - name: Run clean build artifacts
        run: |
          npm run clean
      - name: Run TCM Build
        run: |
          npm run tcm-build
      - name: Run ESLint
        run: |
          npm run eslint
      - name: Run TypeScript compiler build
        run: |
          npm run tsc-build
      - name: Run Jest tests and coverage check
        run: |
          npm run coverage
      - name: Run PMD Copy/Paste Detector
        run: |
          npm run cpd
      - name: Build Webapp with Parcel
        run: |
          npm run build-webapp

  build:
    runs-on: ubuntu-latest
    needs:
      - legacy-tests
      - artifact-coverage
      - lint-and-typecheck
      - frontend-tests-and-build
    strategy:
      matrix:
        python-version: ["3.14.4"]

    steps:
      - name: Confirm split validation passed
        run: |
          echo "All Python and frontend validation jobs passed."
