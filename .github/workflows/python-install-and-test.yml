name: Python package

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9.20"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test with unittest and ensure >= 12% coverage
        run: |
          coverage run && coverage report
      - name: Test artifact pipeline and ensure 100% coverage
        run: |
          PYTHONPATH=. coverage run -m unittest discover src/artifact_pipeline
          PYTHONPATH=. coverage report --fail-under=100 -m --include="src/artifact_pipeline/*"
      - name: Check for PEP8 style violations in artifact pipeline
        run: |
          flake8 src/artifact_pipeline
      - name: Check for type errors
        run: |
          mypy simulate_cribbage_games.py
      - name: Check for PEP8 style violations
        run: |
          flake8
